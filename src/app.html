<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0a121a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafdff" media="(prefers-color-scheme: light)" />
    <!-- Sin título estático aquí: lo aporta el layout raíz (store pageTitle) y
         SvelteKit lo inyecta en el head al renderizar. Tenerlo aquí lo
         duplicaría en SSR. -->

    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="%sveltekit.assets%/favicon-96x96.png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />

    <!-- Runtime config inyectada INLINE por `hooks.server.ts` en cada
         render SSR. NO usamos un script externo (`env.js`) porque los
         browsers lo cachean sin invalidación y dejaba `window.__AUDIORR_BACKEND_URL__`
         congelado al valor del primer despliegue. Inline = parte del HTML
         del documento, que va siempre por SSR y nunca queda stale. -->
    <script>window.__AUDIORR_BACKEND_URL__ = %audiorr.backend_url%;</script>

    <script>
      // FOUC prevention: aplica el tema antes de hidratar.
      (function () {
        try {
          var stored = localStorage.getItem('audiorr-theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = stored || (prefersLight ? 'light' : 'dark');
          var root = document.documentElement;
          root.classList.remove('dark', 'light-theme');
          root.classList.add(theme === 'light' ? 'light-theme' : 'dark');
        } catch (_) {}
      })();
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
